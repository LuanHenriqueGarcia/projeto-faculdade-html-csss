<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastre um novo livro no Catálogo de Livros. Preencha título, autor e capa.">
  <title>Cadastrar Livro — Catálogo de Livros</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo">Catálogo<span>.</span>Livros</span>
      <nav aria-label="Navegação principal">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="cadastrar.html" class="ativo">Cadastrar livro</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="secao-form" aria-label="Formulário de cadastro de livro">

      <h1>Cadastro de Livro</h1>
      <p class="subtitulo">Preencha as informações abaixo para adicionar um novo livro ao catálogo.</p>

      <form action="#" method="post" enctype="multipart/form-data" novalidate>

        <div class="grupo-campo">
          <label for="titulo">Título</label>
          <input
            type="text"
            id="titulo"
            name="titulo"
            placeholder="Ex: O Hobbit"
            aria-required="true"
            autocomplete="off"
          >
        </div>

        <div class="grupo-campo">
          <label for="autor">Autor</label>
          <input
            type="text"
            id="autor"
            name="autor"
            placeholder="Ex: J.R.R. Tolkien"
            aria-required="true"
            autocomplete="off"
          >
        </div>

        <div class="grupo-campo">
          <label for="genero">Gênero literário</label>
          <input
            type="text"
            id="genero"
            name="genero"
            placeholder="Ex: Fantasia, Romance, Distopia..."
            autocomplete="off"
          >
        </div>

        <div class="grupo-campo">
          <label for="descricao">Descrição</label>
          <textarea
            id="descricao"
            name="descricao"
            placeholder="Uma breve sinopse do livro..."
            rows="4"
            aria-label="Descrição ou sinopse do livro"
          ></textarea>
        </div>

        <div class="grupo-campo">
          <label for="capa">Capa (imagem)</label>
          <input
            type="file"
            id="capa"
            name="capa"
            accept="image/*"
            aria-label="Selecione uma imagem de capa para o livro"
          >
        </div>

        <button type="submit" class="btn-principal">
          Cadastrar livro
        </button>

      </form>

    </section>

  </main>

  <footer>
    <p>&copy; 2026 <strong>Catálogo de Livros</strong> — Projeto acadêmico UniALFA</p>
  </footer>

</body>
</html>
